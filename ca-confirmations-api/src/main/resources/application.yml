server:
  port: 8085

spring:
  application:
    name: ca-confirmations-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${CA_DB_URL}
    username: ${CA_DB_USERNAME}
    password: ${CA_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  cache:
    type: caffeine
    caffeine:
      # 30s TTL — CA confirmations can be corrected within minutes
      # maximumSize=1000 covers concurrent ISIN/eventType query combinations
      spec: maximumSize=1000,expireAfterWrite=30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
