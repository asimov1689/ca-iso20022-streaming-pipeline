# Local sandbox overlay for end-to-end testing.
#
# Usage:
#   docker compose --env-file infrastructure/sandbox/sandbox.env \
#     -f infrastructure/productive/docker-compose.yml \
#     -f infrastructure/sandbox/docker-compose.yml up --build
services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports: ["2181:2181"]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports: ["9092:9092"]
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      CA_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ../shared/kafka/create-topics.sh:/opt/ca/create-topics.sh:ro
    entrypoint: ["/bin/sh", "/opt/ca/create-topics.sh"]

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${CA_SANDBOX_DB_NAME:-caevents}
      POSTGRES_USER: ${CA_SANDBOX_DB_USERNAME:-causer}
      POSTGRES_PASSWORD: ${CA_SANDBOX_DB_PASSWORD:-capass}
    ports: ["5432:5432"]
    volumes:
      - pgdata-sandbox:/var/lib/postgresql/data
      - ../shared/postgres/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CA_SANDBOX_DB_USERNAME:-causer} -d ${CA_SANDBOX_DB_NAME:-caevents}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ca-cobol-stub:
    image: ${CA_COBOL_STUB_IMAGE:-ca-cobol-stub:0.0.1-SNAPSHOT}
    build: ../../ca-cobol-stub
    ports: ["8086:8086"]
    environment:
      SPRING_PROFILES_ACTIVE: sandbox

  ca-producer:
    build: ../../ca-producer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: sandbox
      CA_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  ca-formatter:
    build: ../../ca-formatter
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    environment:
      SPRING_PROFILES_ACTIVE: sandbox
      CA_KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  ca-enricher:
    build: ../../ca-enricher
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      ca-cobol-stub:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: sandbox
      CA_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CA_DB_URL: jdbc:postgresql://postgres:5432/${CA_SANDBOX_DB_NAME:-caevents}
      CA_DB_USERNAME: ${CA_SANDBOX_DB_USERNAME:-causer}
      CA_DB_PASSWORD: ${CA_SANDBOX_DB_PASSWORD:-capass}
      CA_REFERENCE_DATA_URL: http://ca-cobol-stub:8086

  ca-materializer:
    build: ../../ca-materializer
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: sandbox
      CA_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      CA_DB_URL: jdbc:postgresql://postgres:5432/${CA_SANDBOX_DB_NAME:-caevents}
      CA_DB_USERNAME: ${CA_SANDBOX_DB_USERNAME:-causer}
      CA_DB_PASSWORD: ${CA_SANDBOX_DB_PASSWORD:-capass}

  ca-confirmations-api:
    build: ../../ca-confirmations-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: sandbox
      CA_DB_URL: jdbc:postgresql://postgres:5432/${CA_SANDBOX_DB_NAME:-caevents}
      CA_DB_USERNAME: ${CA_SANDBOX_DB_USERNAME:-causer}
      CA_DB_PASSWORD: ${CA_SANDBOX_DB_PASSWORD:-capass}

volumes:
  pgdata-sandbox:
