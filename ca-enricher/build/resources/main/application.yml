server:
  port: 8083
spring:
  application:
    name: ca-enricher
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: ca-enricher-group
      auto-offset-reset: earliest
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  datasource:
    url: jdbc:postgresql://localhost:5432/caevents
    username: causer
    password: capass
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
cobol:
  stub-url: http://localhost:8086
