server:
  port: 8083

spring:
  application:
    name: ca-enricher
  kafka:
    bootstrap-servers: ${CA_KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: ca-enricher-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.gagroup.ca.model"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  datasource:
    url: ${CA_DB_URL}
    username: ${CA_DB_USERNAME}
    password: ${CA_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=3600s

cobol:
  stub:
    url: ${CA_REFERENCE_DATA_URL}
